<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAI - Result</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at center, #1a1a40 0%, #000000 100%);
            color: white;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        /* CHẶN MOBILE */
        @media (max-width: 800px) {
            #main-content { display: none; }
            #mobile-blocker { display: flex !important; }
        }
        #mobile-blocker {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; flex-direction: column; align-items: center; justify-content: center;
        }

        /* NÚT BACK */
        .back-btn {
            margin-top: 30px;
            width: 180px; height: 60px;
            background: #c9e6ff; border: 2px solid black;
            border-radius: 40px; cursor: pointer;
            font-weight: bold; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            color: black; text-decoration: none;
            transition: 0.3s;
        }
        .back-btn:hover { background: #ffaaaa; }

        /* KHỐI KẾT QUẢ */
        .result-container {
            margin-top: 40px;
            display: flex; flex-direction: column; align-items: center;
            width: 100%;
        }

        .result-title {
            background: #00bcd4;
            color: #ff3d3d;
            font-size: 80px;
            font-weight: bold;
            padding: 10px 80px;
            border-radius: 30px;
            border: 4px solid #fff;
            margin-bottom: 40px;
            box-shadow: 0 0 30px rgba(0, 188, 212, 0.5);
        }

        .info-row {
            font-size: 45px;
            font-weight: bold;
            margin: 15px 0;
            text-align: center;
        }

        .label-purple { color: #d178e3; }
        .fix-style { text-decoration: underline; font-style: italic; color: #fff; }

        /* GIẢI THÍCH KẾT QUẢ */
        .description {
            font-size: 20px;
            color: #ccc;
            max-width: 600px;
            text-align: center;
            margin-top: 10px;
            min-height: 50px;
        }

        /* FOOTER */
        .footer-msg {
            position: absolute; bottom: 40px;
            color: #ff9f43; font-size: 32px; font-weight: bold;
            text-align: center; display: flex; align-items: center; gap: 15px;
        }

        .check-icon {
            width: 50px; height: 50px; background: #27ae60;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; border: 3px solid white;
        }
    </style>
</head>
<body>

    <div id="mobile-blocker">
        <h1>⚠️ Thông báo</h1>
        <p>Thiết bị của bạn không đủ để hỗ trợ trang này.</p>
    </div>

    <div id="main-content" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        
        <a href="index.html" class="back-btn">BACK →</a>

        <div class="result-container">
            <div class="result-title">RESULT</div>

            <div class="info-row">
                <span class="label-purple">TOP:</span> <span id="top-val">---</span>
                <div id="top-desc" class="description"></div>
            </div>

            <div class="info-row">
                <span class="label-purple">TIME:</span> <span id="time-val">---</span>
            </div>

            <div class="info-row">
                <span class="fix-style">FIX:</span> <span id="fix-val">0</span>
            </div>
        </div>

        <div class="footer-msg">
            SMARTAI Thank You Join Programming Simulation!
            <div class="check-icon">✔</div>
        </div>
    </div>

    <script>
        // 1. Cập nhật THỜI GIAN THỰC 100%
        function updateDateTime() {
            const now = new Date();
            const date = now.toLocaleDateString('vi-VN');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            // Lấy thêm mili giây để làm "số đếm qua giờ" cho chuẩn xác
            const ms = String(now.getMilliseconds()).padStart(3, '0');

            document.getElementById('time-val').innerText = `${date} | ${hours}:${minutes}:${seconds}.${ms}`;
        }
        setInterval(updateDateTime, 1); // Cập nhật liên tục mỗi mili giây

        // 2. GIẢ LẬP HỆ THỐNG KIỂM TRA CODE
        function evaluateSystem() {
            // Trong thực tế, bạn sẽ lấy dữ liệu code từ trang trước
            // Ở đây mình giả lập thuật toán đánh giá ngẫu nhiên nhưng logic
            const results = [
                { rank: "TRUNG BÌNH", desc: "Code còn cơ bản, cần tối ưu cấu trúc và logic chặt chẽ hơn." },
                { rank: "KHÁ", desc: "Kỹ năng lập trình tốt, xử lý được các yêu cầu phức tạp." },
                { rank: "TỐT", desc: "Tuyệt vời! Code sạch đẹp, hiệu suất cao và chuẩn chuyên nghiệp." }
            ];

            const randomResult = results[Math.floor(Math.random() * results.length)];
            
            document.getElementById('top-val').innerText = randomResult.rank;
            document.getElementById('top-desc').innerText = randomResult.desc;
            
            // Giả lập số lỗi hệ thống đã "Fix" được (ngẫu nhiên từ 0-10)
            document.getElementById('fix-val').innerText = Math.floor(Math.random() * 11);
        }

        // Chạy đánh giá khi vừa mở trang
        window.onload = function() {
            evaluateSystem();
            updateDateTime();
        };
    </script>
</body>
</html>
