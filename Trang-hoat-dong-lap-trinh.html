<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAI - Programming Workspace</title>
    <style>
        :root {
            --purple-sidebar: #d178e3;
            --dark-editor: #4d4d4d;
            --cyan-accent: #00bcd4;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }

        /* MÀN HÌNH CHẶN CỨNG */
        #mobile-blocker {
            display: none; position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; background: #000; color: #fff;
            z-index: 10000; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }

        /* GIAO DIỆN CHÍNH */
        #main-app {
            display: flex; flex-direction: column; height: 100vh;
            background: linear-gradient(to bottom, #42e3f5, #ffffff);
        }

        .top-header {
            background: #42e3f5; border: 3px solid black; border-radius: 50px;
            margin: 10px 20px; padding: 12px; text-align: center; font-size: 32px; font-weight: bold;
        }

        .workspace { display: flex; flex: 1; padding: 0 20px 20px; gap: 20px; }

        .sidebar {
            width: 260px; background: var(--purple-sidebar);
            border: 3px solid black; border-radius: 40px;
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }

        .back-btn { width: 80px; background: #c9e6ff; border: 2px solid black; border-radius: 15px; cursor: pointer; font-weight: bold; }

        .menu-title { color: #ff3d3d; font-size: 45px; font-weight: bold; text-align: center; margin: 5px 0; }

        .nav-btn { padding: 12px; border-radius: 20px; border: 2px solid #2980b9; color: white; font-weight: bold; text-align: center; }

        .editor-container {
            flex: 1; background: var(--dark-editor); border: 3px solid black;
            border-radius: 50px; padding: 30px; display: flex; flex-direction: column;
            position: relative; cursor: text;
        }

        .beta-bg-text { 
            font-size: 100px; font-weight: bold; text-align: center; color: black; 
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%); 
            z-index: 1; pointer-events: none; opacity: 0.7;
        }

        .status-line { 
            background: var(--cyan-accent); height: 35px; width: 95%; 
            border-radius: 20px; margin: 110px auto 20px; z-index: 1;
        }

        #code-input {
            width: 100%; background: transparent; border: none; color: #fff;
            font-family: 'Consolas', monospace; font-size: 20px;
            resize: none; outline: none; line-height: 1.5; z-index: 10; flex: 1;
        }

        .description-box { background: #27ae60; color: white; padding: 15px; border-radius: 35px; border: 2px solid black; font-size: 13px; text-align: center; margin-top: auto; }
    </style>
</head>
<body>

    <div id="mobile-blocker">
        <h1 style="font-size: 60px;">⚠️</h1>
        <h2>THIẾT BỊ KHÔNG HỖ TRỢ</h2>
        <p>Hệ thống nhận diện bạn đang dùng Điện thoại/Máy tính bảng.</p>
        <p>Vui lòng dùng <b>Máy tính thực sự</b> để truy cập.</p>
    </div>

    <div id="main-app">
        <div class="top-header">SmartAI Programming Simulation</div>
        <div class="workspace">
            <aside class="sidebar">
                <button class="back-btn" onclick="location.href='index.html'">Back →</button>
                <div class="menu-title">MENU</div>
                <div class="nav-btn" style="background:#4a69bd;">HTML</div>
                <div class="nav-btn" style="background:#4a69bd;">JavaScript</div>
                <div class="nav-btn" style="background:#27ae60;">Python</div>
                <div class="nav-btn" style="background:linear-gradient(to right, #8e44ad, #d178e3); border:none;">CSS</div>
                <div class="description-box">The system tests your programming skills...</div>
            </aside>

            <main class="editor-container" onclick="document.getElementById('code-input').focus()">
                <div class="beta-bg-text">BETA</div>
                <div class="status-line"></div>
                <textarea id="code-input" placeholder="// Gõ code tại đây..."></textarea>
            </main>
        </div>
    </div>

    <script>
        function protectWeb() {
            const userAgent = navigator.userAgent.toLowerCase();
            const isMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(userAgent);
            const isSmallScreen = window.innerWidth <= 1024;

            // Nếu là thiết bị di động HOẶC màn hình quá nhỏ thì chặn
            if (isMobile || isSmallScreen) {
                document.getElementById('main-app').style.display = 'none';
                document.getElementById('mobile-blocker').style.display = 'flex';
            }
        }

        // Chạy ngay khi mở
        protectWeb();
        // Kiểm tra lại nếu người dùng cố tình thay đổi kích thước trình duyệt
        window.onresize = protectWeb;
    </script>
</body>
</html>
