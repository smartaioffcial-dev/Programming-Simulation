<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartAI - Root Admin Override</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Consolas', monospace; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* GIAO DIỆN KHÓA */
        #auth-screen { text-align: center; z-index: 9999; }
        .pin-box { background: transparent; border: none; border-bottom: 3px solid #333; color: #00ff41; font-size: 60px; width: 180px; text-align: center; letter-spacing: 15px; outline: none; margin: 20px; font-family: password; }
        
        /* GIAO DIỆN QUYỀN NĂNG */
        #root-terminal { display: none; width: 100%; height: 100%; flex-direction: column; padding: 20px; box-sizing: border-box; background: #050505; }
        .status-header { border-bottom: 1px solid #00d2ff; padding-bottom: 10px; margin-bottom: 15px; color: #00d2ff; display: flex; justify-content: space-between; font-size: 14px; }
        textarea { flex: 1; background: transparent; border: 1px solid #111; color: #00ff41; padding: 15px; font-size: 16px; outline: none; resize: none; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h2 style="color: #111; letter-spacing: 8px;">ROOT OVERRIDE</h2>
        <input type="password" id="master-pin" class="pin-box" maxlength="4" autofocus>
        <p id="device-notify" style="color: #222; font-size: 10px;">ID: CHECKING...</p>
    </div>

    <div id="root-terminal">
        <div class="status-header">
            <span>TERMINAL@SAMSUNG_A24:~/ROOT</span>
            <span style="color: #ffca28;">● ACCESS_GRANTED: UNRESTRICTED</span>
        </div>
        <textarea spellcheck="false" id="command-line" placeholder="[Hệ thống đã sẵn sàng. Mọi quy chế chặn đã bị vô hiệu hóa...]"></textarea>
    </div>

    <script>
        // MÃ HÓA CỦA "0885"
        const ROOT_HASH = "3961730590c8858229b46e495208573199859f77627404e908994772b1236173";
        const masterPin = document.getElementById('master-pin');

        window.onload = function() {
            // Kiểm tra máy Samsung A24
            const isA24 = /SM-A245|Samsung/i.test(navigator.userAgent);
            if (isA24) {
                document.getElementById('device-notify').innerText = "ID: SAMSUNG_A24_RECOGNIZED";
                document.getElementById('device-notify').style.color = "#004400";
            }
        };

        masterPin.addEventListener('input', async (e) => {
            if (e.target.value.length === 4) {
                const hashed = await sha256(e.target.value);
                if (hashed === ROOT_HASH) {
                    activateRoot();
                } else {
                    e.target.value = '';
                }
            }
        });

        function activateRoot() {
            // LỆNH QUAN TRỌNG NHẤT: Thiết lập quyền MIỄN NHIỄM cho toàn hệ thống
            localStorage.setItem('ADMIN_AUTH', 'TRUE'); // Lệnh này giúp index.html không bao giờ chặn bạn nữa
            
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('root-terminal').style.display = 'flex';
            console.clear();
            
            // Xóa mọi dấu vết của việc đăng nhập sau 0.1s
            setInterval(() => { console.clear(); }, 100);
        }

        async function sha256(str) {
            const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Vô hiệu hóa chuột phải để bảo mật tuyệt đối cho Admin
        window.oncontextmenu = () => true;
    </script>
</body>
</html>
