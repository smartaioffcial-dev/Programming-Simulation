<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART-AI MANAGER</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #2e59d9 0%, #4e73df 30%, #bc6fd1 70%, #d955c4 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: black; display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }

        .header { text-align: center; margin-top: 40px; width: 100%; }
        .header h1 { font-size: 55px; font-weight: 900; margin: -5px 0; letter-spacing: 4px; line-height: 1.1; }

        .red-bar {
            width: 82%; height: 14px; background-color: #ff5f5f;
            border-radius: 20px; margin: 20px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .user-info-panel { align-self: flex-start; margin-left: 8%; margin-top: 10px; font-weight: 700; font-size: 20px; line-height: 1.8; }
        .info-row { display: flex; margin-bottom: 5px; }
        .label { min-width: 200px; }
        #ms-clock { color: #000; font-family: 'Courier New', monospace; font-weight: 900; }

        .btn-group { margin-top: 25px; display: flex; gap: 20px; }
        .btn {
            padding: 10px 22px; border-radius: 12px; border: 1px solid #999; background: #e8e8e8;
            font-weight: 900; cursor: pointer; box-shadow: 3px 3px 0px rgba(0,0,0,0.2);
        }
        .btn-banned { color: #ff0000; }
        .btn-unban { color: #ff5f5f; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header">
        <h1>SMART-AI</h1>
        <h1>MANAGER</h1>
        <div class="red-bar"></div>
    </div>

    <div class="user-info-panel">
        <div class="info-row"><span class="label">User name:</span><span>SmartAI_Admin_Beta</span></div>
        <div class="info-row"><span class="label">Time account create:</span><span id="ms-clock">00/00/0000 00:00:00:000</span></div>
        <div class="info-row"><span class="label">Email/Phone:</span><span>admin.security@smartai.vn</span></div>
        <div class="info-row"><span class="label">Country:</span><span id="user-country">Đang truy quét...</span></div>

        <div class="btn-group">
            <button class="btn btn-banned" onclick="execBanned()">Banned</button>
            <button class="btn btn-unban" onclick="execUnban()">Unban</button>
        </div>
    </div>

    <script>
        // 1. CHỐT CHẶN BẢO MẬT: CHỈ CÓ ?admin=true MỚI VÀO ĐƯỢC
        (function checkSecurity() {
            const urlParams = new URLSearchParams(window.location.search);
            // Nếu link dell có đuôi ?admin=true thì đá văng về trang chủ ngay lập tức
            if (urlParams.get('admin') !== 'true') {
                window.location.replace("https://your-github-username.github.io/Programming-Simulation");
                document.body.innerHTML = ""; // Xóa trắng trang luôn cho gắt
            }
        })();

        // 2. TỰ ĐỘNG LẤY QUỐC GIA (DELL KHÓA CHẾT)
        fetch('https://ipapi.co/json/').then(r => r.json()).then(d => {
            document.getElementById('user-country').innerText = d.country_name || "Vietnam (VN)";
        }).catch(() => { document.getElementById('user-country').innerText = "Vietnam (VN)"; });

        // 3. ĐỒNG HỒ MILI-GIÂY CHẠY XÉ GIÓ
        setInterval(() => {
            const now = new Date();
            const timeStr = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}:${String(now.getMilliseconds()).padStart(3,'0')}`;
            document.getElementById('ms-clock').innerText = timeStr;
        }, 1);

        // 4. QUYỀN SINH SÁT
        function execBanned() {
            if(confirm("Xác Nhận Lệnh Banned?")) {
                localStorage.setItem('BANNED_USER', 'TRUE');
                alert("Đã ghim lệnh Banned vĩnh viễn lên hệ thống!");
            }
        }

        function execUnban() {
            localStorage.removeItem('BANNED_USER');
            alert("Unban successfully!");
        }

        // CHỐNG SOI CODE
        window.oncontextmenu = () => false;
        document.onkeydown = (e) => { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false; };
    </script>
</body>
</html>
